<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Timeline line -->
  <line x1="60" y1="100" x2="840" y2="100" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Phase 1: Problem -->
  <circle cx="100" cy="100" r="12" fill="#2563eb"/>
  <text x="100" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Problem</text>
  <text x="100" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Identified</text>
  <text x="100" y="130" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Month 0</text>

  <!-- Phase 2: Evidence -->
  <circle cx="225" cy="100" r="12" fill="#0d9488"/>
  <text x="225" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Evidence</text>
  <text x="225" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Gathering</text>
  <text x="225" y="130" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Months 1-3</text>

  <!-- Phase 3: Roundtable -->
  <circle cx="350" cy="100" r="12" fill="#7c3aed"/>
  <text x="350" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">First</text>
  <text x="350" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Roundtable</text>
  <text x="350" y="130" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Months 4-6</text>

  <!-- Phase 4: Obstacles -->
  <circle cx="475" cy="100" r="12" fill="#e11d48"/>
  <text x="475" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Navigating</text>
  <text x="475" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Obstacles</text>
  <text x="475" y="130" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Months 7-10</text>

  <!-- Phase 5: Design -->
  <circle cx="600" cy="100" r="12" fill="#f59e0b"/>
  <text x="600" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Workshop</text>
  <text x="600" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Design</text>
  <text x="600" y="130" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Months 10-14</text>

  <!-- Phase 6: Workshop -->
  <circle cx="725" cy="100" r="14" fill="#16a34a" stroke="#16a34a" stroke-width="3"/>
  <text x="725" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Workshop</text>
  <text x="725" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Delivery</text>
  <text x="725" y="130" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Month 15</text>

  <!-- Phase 7: Ownership -->
  <circle cx="840" cy="100" r="14" fill="#1a2744"/>
  <text x="840" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Collective</text>
  <text x="840" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#1a2744">Ownership</text>
  <text x="840" y="130" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Months 15-18</text>

  <!-- Arrow at end -->
  <polygon points="855,100 845,94 845,106" fill="#1a2744"/>

  <!-- Label -->
  <text x="450" y="170" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#94a3b8" font-style="italic">~18 months from problem identification to collective action</text>
</svg>
